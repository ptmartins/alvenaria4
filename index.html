<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.css">
    <link rel="stylesheet" href="css/styes.css">
    <title>Alvenaria</title>
</head>
<body>

    <header class="header">
        <div class="inner-wrapper inner-wrapper--header">
            <!-- Logo -->
            <div class="header__logo">
                <img class="A4_png" src="Images/Logo/Logo_Alvenaria4-simbolo.png" alt="logo" href="#"/>
            </div>
            <input type="checkbox" class="menu-btn" id="menu-btn" id="menu-btn">
            <label for="menu-btn" class="menu-icon">
                <span class="menu-icon__line"></span>
            </label>
            <!-- Navigation -->
            <ul class="nav-links">
                <li class="nav-link">
                    <a href="#">HOME</a>
                </li>
                <li class="nav-link">
                    <a href="#">SERVIÇOS</a>
                </li>
                <li class="nav-link">
                    <a href="#">SOBRE NÓS</a>
                </li>
                <li class="nav-link">
                    <a href="#">PORTFOLIO</a>
                </li>
                <li class="nav-link">
                    <a href="#">EQUIPA</a>
                </li>
            </ul>
        </div>
    </header>
    <main class="main">
        <!-- Hero section -->
        <section class="hero">
            <!-- Slider -->
            <ul class="slide-show">
                <div>
                    <img src="./images/slider/image1.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image2.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image3.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image4.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image5.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image6.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image7.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image8.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image9.jpg" alt="" class="slide">
                </div>
                <div>
                    <img src="./images/slider/image10.jpg" alt="" class="slide">
                </div>
            </ul>
            <div class="slider__overlay">
                <a href="#" class="btn">
                    <span class="btn-content">Contacte-nos</span>
                    <span class="icon">
                        <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>
                <p>"Qualidade significa fazer certo quando ninguém está a ver." - Henry Ford</p>
            </div>
        </section>

        <section class="section section--team">
            <div class="inner-wrapper">
                <h2 class="section__title">Equipa</h2>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>
    
    <!-- JS -->
    <script type="text/javascript" src="//code.jquery.com/jquery-1.11.0.min.js"></script>
    <script type="text/javascript" src="//code.jquery.com/jquery-migrate-1.2.1.min.js"></script>        
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
